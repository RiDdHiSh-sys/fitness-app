name: 📦 Build & Release Android APK

on:
  # Trigger when you push a version tag like v1.0.0
  push:
    tags:
      - 'v*.*.*'

  # Also allow manual trigger
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'
      release_notes:
        description: 'Release notes'
        required: false
        default: 'New release of Fitness AI'

permissions:
  contents: write   # Required to create GitHub Releases

jobs:
  # ─── Job 1: Type Check ─────────────────────────────────────────────────────
  typecheck:
    name: 🔍 TypeScript Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit --skipLibCheck

  # ─── Job 2: Build Signed APK ───────────────────────────────────────────────
  build-apk:
    name: 🤖 Build Signed APK
    runs-on: ubuntu-latest
    needs: typecheck

    defaults:
      run:
        working-directory: mobile

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      # ── Node ──────────────────────────────────────────────────────────────
      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: 📦 Install Node dependencies
        run: npm ci

      # ── Java (required for Gradle) ─────────────────────────────────────────
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── Expo prebuild (generates native Android project) ──────────────────
      - name: 🏗️ Generate Android native project
        run: npx expo prebuild --platform android --non-interactive --clean
        env:
          EXPO_NO_TELEMETRY: 1

      # ── Decode keystore from GitHub Secrets ───────────────────────────────
      - name: 🔑 Decode release keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore
          echo "✅ Keystore decoded"

      # ── Inject signing config into build.gradle ───────────────────────────
      - name: 🔧 Patch Gradle signing configuration
        run: |
          python3 << 'PYEOF'
          import re

          path = "android/app/build.gradle"
          with open(path, "r") as f:
              content = f.read()

          # Signing config block to inject
          signing_config = """
              signingConfigs {
                  release {
                      storeFile file("release.keystore")
                      storePassword project.findProperty("KEYSTORE_PASS") ?: ""
                      keyAlias project.findProperty("KEY_ALIAS") ?: ""
                      keyPassword project.findProperty("KEY_PASS") ?: ""
                  }
              }
          """

          # Inject signingConfigs before buildTypes
          if "signingConfigs" not in content:
              content = content.replace(
                  "    buildTypes {",
                  signing_config + "\n    buildTypes {",
                  1
              )

          # Make release build type use signing config
          release_patch = """        release {
                  signingConfig signingConfigs.release"""
          content = re.sub(
              r'        release \{',
              release_patch,
              content,
              count=1
          )

          with open(path, "w") as f:
              f.write(content)

          print("✅ build.gradle patched with signing config")
          PYEOF

      # ── Gradle cache (speeds up builds significantly) ─────────────────────
      - name: 💾 Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('mobile/android/**/*.gradle*', 'mobile/android/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-

      # ── Build release APK ─────────────────────────────────────────────────
      - name: 🔨 Build release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -PKEYSTORE_PASS="${{ secrets.KEYSTORE_PASSWORD }}" \
            -PKEY_ALIAS="${{ secrets.KEY_ALIAS }}" \
            -PKEY_PASS="${{ secrets.KEY_PASSWORD }}" \
            --no-daemon \
            --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"

      # ── Rename APK with version tag ───────────────────────────────────────
      - name: 📝 Rename APK
        run: |
          TAG="${{ github.ref_name || github.event.inputs.tag }}"
          APK_SRC="android/app/build/outputs/apk/release/app-release.apk"
          APK_DEST="android/app/build/outputs/apk/release/FitnessAI-${TAG}.apk"
          mv "$APK_SRC" "$APK_DEST"
          echo "APK_PATH=$APK_DEST" >> $GITHUB_ENV
          echo "APK_NAME=FitnessAI-${TAG}.apk" >> $GITHUB_ENV
          echo "✅ APK renamed to FitnessAI-${TAG}.apk"

      # ── Upload APK as build artifact (for download from Actions tab) ──────
      - name: ⬆️ Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: mobile/${{ env.APK_PATH }}
          retention-days: 90

      # ── Create GitHub Release and attach APK ──────────────────────────────
      - name: 🚀 Create GitHub Release & Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || github.event.inputs.tag }}
          name: "🏋️ Fitness AI ${{ github.ref_name || github.event.inputs.tag }}"
          body: |
            ## 📱 Fitness AI — ${{ github.ref_name || github.event.inputs.tag }}

            ${{ github.event.inputs.release_notes || 'New release of Fitness AI mobile app.' }}

            ### 📥 Installation
            1. Download **${{ env.APK_NAME }}** below
            2. On your Android device: **Settings → Security → Install Unknown Apps → Allow**
            3. Open the downloaded APK and install

            ### 🔗 Backend
            Connected to: `https://fitness-nutrition-backend-odjl.onrender.com`

            ### 📋 What's included
            - 🏠 Home Dashboard with AI recommendations
            - 💪 Workout Logger (MET-based calorie calculation)
            - 🥗 Meal & Macro Tracker
            - 🤖 AI Coach Chat
            - 💤 Sleep & Recovery Score
            - 🎯 Pose Feedback (Squat & Bicep Curl)

            ---
            Built from commit `${{ github.sha }}`
          files: mobile/${{ env.APK_PATH }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Summary ───────────────────────────────────────────────────────────
      - name: 📊 Build Summary
        run: |
          APK_SIZE=$(du -sh "mobile/${{ env.APK_PATH }}" | cut -f1)
          echo "## ✅ APK Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **File** | \`${{ env.APK_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Size** | $APK_SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| **Tag** | \`${{ github.ref_name || github.event.inputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 [View Release](https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name || github.event.inputs.tag }})" >> $GITHUB_STEP_SUMMARY
