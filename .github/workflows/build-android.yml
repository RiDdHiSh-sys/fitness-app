name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: |
          cd mobile
          npm install

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Extract version from app.json
        id: get_version
        run: |
          VERSION=$(jq -r '.expo.version' mobile/app.json)
          VERSION_CODE=$(jq -r '.expo.android.versionCode' mobile/app.json)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "Extracted version: $VERSION ($VERSION_CODE)"

      - name: Prebuild Expo App
        run: |
          cd mobile
          npx expo prebuild --platform android --no-install

      - name: Decode release keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > mobile/android/app/release.keystore
          echo "✅ Keystore decoded"

      - name: Patch Gradle signing configuration
        run: |
          python3 << 'PYEOF'
          path = "mobile/android/app/build.gradle"
          with open(path, "r") as f:
              content = f.read()

          # Normalize line endings to \n
          content = content.replace("\r\n", "\n")

          # Inject release signing config
          old_signing = (
              "    signingConfigs {\n"
              "        debug {\n"
              "            storeFile file('debug.keystore')\n"
              "            storePassword 'android'\n"
              "            keyAlias 'androiddebugkey'\n"
              "            keyPassword 'android'\n"
              "        }\n"
              "    }"
          )

          new_signing = (
              "    signingConfigs {\n"
              "        debug {\n"
              "            storeFile file('debug.keystore')\n"
              "            storePassword 'android'\n"
              "            keyAlias 'androiddebugkey'\n"
              "            keyPassword 'android'\n"
              "        }\n"
              "        release {\n"
              "            storeFile file(\"release.keystore\")\n"
              "            storePassword project.findProperty(\"KEYSTORE_PASS\") ?: \"\"\n"
              "            keyAlias project.findProperty(\"KEY_ALIAS\") ?: \"\"\n"
              "            keyPassword project.findProperty(\"KEY_PASS\") ?: \"\"\n"
              "        }\n"
              "    }"
          )

          if old_signing in content:
              content = content.replace(old_signing, new_signing)
          else:
              print("Warning: could not find debug signingConfigs block, attempting fallback injection")
              if "signingConfigs {" in content and "release {" not in content:
                  content = content.replace("signingConfigs {", "signingConfigs {\n        release {\n            storeFile file(\"release.keystore\")\n            storePassword project.findProperty(\"KEYSTORE_PASS\") ?: \"\"\n            keyAlias project.findProperty(\"KEY_ALIAS\") ?: \"\"\n            keyPassword project.findProperty(\"KEY_PASS\") ?: \"\"\n        }")

          # Update release buildType to use release signing config
          old_release_config = (
              "        release {\n"
              "            // Caution! In production, you need to generate your own keystore file.\n"
              "            // see https://reactnative.dev/docs/signed-apk-android.\n"
              "            signingConfig signingConfigs.debug"
          )

          new_release_config = (
              "        release {\n"
              "            // Caution! In production, you need to generate your own keystore file.\n"
              "            // see https://reactnative.dev/docs/signed-apk-android.\n"
              "            signingConfig signingConfigs.release"
          )

          if old_release_config in content:
              content = content.replace(old_release_config, new_release_config)
          else:
              print("Warning: could not find release buildType block")

          with open(path, "w") as f:
              f.write(content)

          print("✅ build.gradle patched with signing config")
          PYEOF

      - name: Build Android APK
        run: |
          cd mobile/android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -PKEYSTORE_PASS="${{ secrets.KEYSTORE_PASSWORD }}" \
            -PKEY_ALIAS="${{ secrets.KEY_ALIAS }}" \
            -PKEY_PASS="${{ secrets.KEY_PASSWORD }}" \
            --no-daemon \
            --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"

      - name: Rename and Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fitness-ai-v${{ env.VERSION }}-b${{ env.VERSION_CODE }}
          path: mobile/android/app/build/outputs/apk/release/app-release.apk
